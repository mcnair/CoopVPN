name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

# Force GitHub Actions to use Node 24 to silence the deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        
      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"
        
      - name: Build with Hugo (via Docker)
        env:
          # HUGO_ENVIRONMENT: production
          # If it's the main branch, use your Production URL from GitHub Variables. 
          # Otherwise, fall back to the dynamic GitHub Pages URL.
          DYNAMIC_BASE_URL: ${{ github.ref == 'refs/heads/main' && vars.PRODUCTION_URL || steps.pages.outputs.base_url }}
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src \
            --user $(id -u):$(id -g) \
            docker.io/floryn90/hugo:asciidoctor \
            --minify \
            --baseURL "${{ env.DYNAMIC_BASE_URL }}/"
        ## --baseURL "${{ steps.pages.outputs.base_url }}/"
            
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
